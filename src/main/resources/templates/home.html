<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家計簿アプリ</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h1>家計簿アプリ</h1>

    <p th:if="${errorMessage}" th:text="${errorMessage}" class="error-message"></p>

    <form action="/add" method="post">
        <div class="form-group">
            <label>日付</label>
            <input type="date" name="date">
        </div>

        <div class="form-group">
            <label>金額</label>
            <input type="number" name="amount">
        </div>

        <div class="form-group">
            <label>内容</label>
            <input type="text" name="content">
        </div>

        <div class="form-group">
            <label>カテゴリ</label>
            <select name="category">
                <option value="">選択してください</option>
                <option value="食費">食費</option>
                <option value="日用品">日用品</option>
                <option value="交通費">交通費</option>
                <option value="交際費">交際費</option>
                <option value="通信費">通信費</option>
                <option value="その他">その他</option>
            </select>
        </div>

        <button type="submit" class="submit-button">登録</button>
    </form>

    <section class="calendar-section">
        <h2 th:text="${displayYear} + '年' + ${displayMonth} + '月'"></h2>

        <div class="calendar-grid">
            <div th:each="day : ${days}" class="calendar-day">
                <div class="calendar-day-number" th:text="${day}"></div>

                <ul th:if="${calendarExpenses[day] != null}" class="calendar-expense-list">
                    <li th:each="expense : ${calendarExpenses[day]}">
                        <span th:text="${expense.category}"></span>
                        <span th:text="${expense.amount}"></span>円
                    </li>
                </ul>
            </div>
        </div>
    </section>

    <h2>支出一覧</h2>

    <div th:each="entry : ${groupedExpenses}" class="date-group">
        <h3 th:text="${entry.key}"></h3>

        <ul>
            <li th:each="expense : ${entry.value}">
                <span th:text="${expense.category}"></span>
                <span th:text="${expense.content}"></span>
                <span th:text="${expense.amount}"></span>円

                <form action="/edit" method="get" style="display:inline;">
                    <input type="hidden" name="id" th:value="${expense.id}">
                    <button type="submit" class="edit-button">編集</button>
                </form>

                <form action="/delete" method="post" style="display:inline;">
                    <input type="hidden" name="id" th:value="${expense.id}">
                    <button type="submit" class="delete-button">削除</button>
                </form>
            </li>
        </ul>
    </div>
</div>
</body>
</html>
